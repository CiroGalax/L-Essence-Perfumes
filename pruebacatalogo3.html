<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo - L´Essence</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
}

header {
    background: black;
    color: white;
    text-align: center;
    padding: 30px;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
    gap: 20px;
}

.card {
    background: white;
    width: 220px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    text-align: center;
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.card h3 {
    margin: 10px 0;
}

.price {
    color: green;
    font-weight: bold;
}

.btn {
    display: block;
    margin: 10px;
    padding: 10px;
    background: #25D366;
    color: white;
    text-decoration: none;
    border-radius: 6px;
}

</style>
</head>

<body>

<header>
    <h1>Catálogo</h1>
</header>

<div class="container">

    <div class="card">
        <img src="imagenes/perfume1.jpg">
        <h3>Perfume Árabe</h3>
        <p class="price">$25.000</p>
        <a href="https://wa.me/543584114412" class="btn">Comprar</a>
    </div>

    <div class="card">
        <img src="imagenes/perfume2.jpg">
        <h3>Fragancia Premium</h3>
        <p class="price">$30.000</p>
        <a href="https://wa.me/543584114412" class="btn">Comprar</a>
    </div>

</div>

</body>
</html>
